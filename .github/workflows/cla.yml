name: cla

# CLA assistant. Posts a comment on every PR from a new contributor
# pointing at CLA.md and asking them to sign by replying with the
# exact phrase. Signatures are persisted in a JSON file on the
# `cla-signatures` branch of this repo, so contributors only sign
# once across all their PRs.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    # Only run on PR events, or comments that are on a PR (not on
    # plain issues). The action's own filter handles the "I have
    # read…" trigger phrase.
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/v1/cla.json
          path-to-document: https://github.com/drip-cli/drip-meter-macos/blob/main/CLA.md
          branch: cla-signatures
          # Perform Code SAS founders (own all rights to the project under
          # the CLA, so they don't need to re-sign their own contributions).
          # Add new maintainers here as they join the company.
          allowlist: Hugobrbs,MaxenceB59,Hugoy8,dependabot[bot]
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA ✓'
          custom-notsigned-prcomment: |
            Thanks for the contribution! Before we can merge this PR, please sign our [Contributor License Agreement](https://github.com/drip-cli/drip-meter-macos/blob/main/CLA.md).

            **To sign:** post a new comment on this PR with the exact text:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to sign once — your signature carries across all your future PRs.
          lock-pullrequest-aftermerge: false
