# Release pipeline for DripMeter — tag-driven.
#
# Push a `vX.Y.Z` tag and this workflow:
#   1. Builds `DripMeter.app` on macOS (release config) via
#      package_app.sh, which already handles xattr stripping and
#      ad-hoc signing.
#   2. Zips the bundle and uploads it as `DripMeter-vX.Y.Z.zip`
#      plus a matching `SHA256SUMS` file to the GitHub Release.
#   3. Regenerates `Casks/dripmeter.rb` in `drip-cli/homebrew-drip`
#      with the new version + sha256 and pushes it. `brew upgrade
#      drip-cli/drip/dripmeter` is live within minutes.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0). Leave blank to dry-run."
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build DripMeter.app
    # `macos-15` runner ships Xcode 16 + Swift 6 by default — required
    # because Package.swift declares `swift-tools-version: 6.0`. The
    # older `macos-14` image only had Xcode 15 / Swift 5.10 and the
    # previous `xcode-select` hack at /Applications/Xcode_16.app
    # didn't exist on that image.
    runs-on: macos-15
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.hash.outputs.sha256 }}
      asset_name: ${{ steps.hash.outputs.asset_name }}

    steps:
      - uses: actions/checkout@v4

      # `version.env` is the single source of truth for the marketing
      # version. We pin the tag against it so the artifact filename
      # and the cask version line up. If they don't match, the release
      # fails loudly here rather than shipping a mismatched cask.
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          source ./version.env
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$DRIPMETER_VERSION" ]; then
            echo "::error::Tag $TAG (v$TAG_VERSION) does not match version.env (DRIPMETER_VERSION=$DRIPMETER_VERSION)."
            exit 1
          fi
          echo "version=$DRIPMETER_VERSION" >> "$GITHUB_OUTPUT"
          echo "Building DripMeter v$DRIPMETER_VERSION"

      # Sanity log so a future runner-image upgrade is obvious in the
      # run history. macos-15's default Xcode should be >= 16 today,
      # but pinning here gives us a single place to bump if Apple
      # ships Swift 7 and we need to be explicit.
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Package DripMeter.app
        run: |
          # CONFIGURATION=release is the default in package_app.sh.
          # It runs swift build, copies the binary into the bundle,
          # strips xattrs via `ditto --norsrc --noextattr --noacl`,
          # and ad-hoc signs. No Apple Developer ID involved — users
          # who install via Homebrew will need to authorise the app
          # in System Settings → Privacy & Security on first launch.
          ./Scripts/package_app.sh

      - name: Verify SPM sub-bundle Info.plist
        # Regression guard. SwiftPM does not emit an Info.plist for
        # resource bundles on macOS, so `Bundle.module` crashes on
        # first asset lookup. package_app.sh stamps it manually; if
        # a future refactor loses that step, fail loudly here rather
        # than ship a broken .app to Homebrew users.
        run: |
          set -euo pipefail
          PLIST="DripMeter.app/Contents/Resources/DripMeter_DripMeter.bundle/Info.plist"
          test -f "$PLIST" || { echo "::error::Missing $PLIST — Bundle.module would crash on launch"; exit 1; }
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$PLIST"

      - name: Compress + checksum
        id: hash
        run: |
          set -euo pipefail
          V="${{ steps.version.outputs.version }}"
          ASSET="DripMeter-v${V}.zip"
          ditto -c -k --keepParent DripMeter.app "$ASSET"
          SHA=$(shasum -a 256 "$ASSET" | cut -d' ' -f1)
          echo "$SHA  $ASSET" > SHA256SUMS
          echo "asset_name=$ASSET" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Asset: $ASSET — sha256: $SHA"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dripmeter-app
          path: |
            DripMeter-v${{ steps.version.outputs.version }}.zip
            SHA256SUMS
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.tag != ''
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dripmeter-app
          path: dist

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          generate_release_notes: true
          files: |
            dist/DripMeter-*.zip
            dist/SHA256SUMS

  # Auto-bumps the Homebrew cask in drip-cli/homebrew-drip after
  # every published release. Skipped on workflow_dispatch dry-runs
  # (no tag), and skipped if HOMEBREW_TAP_TOKEN isn't set so forks
  # build cleanly without secrets.
  update-homebrew:
    name: Bump Homebrew cask
    needs: [build, publish]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      # Probe the token once and gate every subsequent step on the
      # output. Earlier revision used `if: env.HOMEBREW_TAP_TOKEN ==
      # ''` on a step that *also* set the `env:` block — workflow
      # expressions are evaluated before `env:` is applied to the
      # step, so the check always saw an empty string and skipped
      # the entire job even when the secret was set. The drip-cli
      # pattern (explicit probe step + output) sidesteps this trap.
      - name: Probe HOMEBREW_TAP_TOKEN
        id: probe
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "has-token=false" >> "$GITHUB_OUTPUT"
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping tap update."
          else
            echo "has-token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout homebrew tap
        if: steps.probe.outputs.has-token == 'true'
        uses: actions/checkout@v4
        with:
          repository: drip-cli/homebrew-drip
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-drip

      # Surgical bump: rewrite only `version "..."` and `sha256 "..."`
      # so hand-edits to caveats / zap / postflight stick. The earlier
      # full-template render clobbered everything — notably the
      # narrow `xattr -d com.apple.quarantine` postflight (which only
      # targets the top-level bundle xattr) was being replaced by a
      # recursive `xattr -cr` that crashes on SIP-protected internals
      # like `Contents/_CodeSignature/`. Keep the cask as the source
      # of truth for everything that isn't version/sha256.
      - name: Bump Casks/dripmeter.rb
        if: steps.probe.outputs.has-token == 'true'
        env:
          VERSION: ${{ needs.build.outputs.version }}
          SHA256: ${{ needs.build.outputs.sha256 }}
        run: |
          set -euo pipefail
          cd homebrew-drip
          sed -i -E "s|^  version \"[^\"]+\"|  version \"${VERSION}\"|" Casks/dripmeter.rb
          sed -i -E "s|^  sha256 \"[^\"]+\"|  sha256 \"${SHA256}\"|" Casks/dripmeter.rb
          echo "── resulting top of cask ──"
          head -5 Casks/dripmeter.rb
          echo "── diff ──"
          git diff Casks/dripmeter.rb

      - name: Commit and push
        if: steps.probe.outputs.has-token == 'true'
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          cd homebrew-drip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/dripmeter.rb
          # No-op guard: re-running the workflow on the same tag must
          # not produce an empty commit.
          if git diff --staged --quiet; then
            echo "→ dripmeter.rb already at v${VERSION} — nothing to do"
            exit 0
          fi
          git commit -m "dripmeter ${VERSION}"
          git push
