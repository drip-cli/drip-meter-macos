name: release-please

# Runs on every push to main. release-please reads Conventional
# Commit messages since the last release tag, opens (or updates) a
# release PR that bumps `.github/.release-please-manifest.json` +
# `CHANGELOG.md`, and — when you merge that PR — creates the
# matching `vX.Y.Z` tag. The release pipeline (TBD on a separate
# workflow) picks up the tag and builds the DripMeter.app bundle.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Config + manifest are committed under .github/ so the
          # action picks them up; the manifest tracks the current
          # version and updates atomically with the release PR.
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          # The repo's default branch is `develop` (feature work) but
          # releases are cut from `main`. Without this override, the
          # action would open the release PR against develop.
          target-branch: main
          # Default GITHUB_TOKEN cannot open PRs when the org policy
          # blocks "Allow GitHub Actions to create and approve pull
          # requests". A fine-grained PAT scoped to the repo with
          # `contents: write` + `pull-requests: write` works around
          # it. Falls back to GITHUB_TOKEN if the secret is unset so
          # forks don't crash here.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
